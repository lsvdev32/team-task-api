version: "3.9"

services:
  mysql:
    image: mysql:8
    container_name: teamtasks_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: teamtasks
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  api:
    build: .
    container_name: teamtasks_api
    restart: always
    env_file: .env
    ports:
      - "4000:4000"
    depends_on:
      - mysql

volumes:
  mysql_data: