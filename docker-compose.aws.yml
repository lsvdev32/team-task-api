services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: teamtasks_backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      DB_HOST: ${DB_HOST}
      DB_PORT: 3306
      DB_NAME: teamtasks
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: supersecret

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: teamtasks_frontend
    restart: always
    ports:
      - "80:80"
